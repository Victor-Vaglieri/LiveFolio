# Equivalente ao Database\Connection.php
# Usamos as mesmas variaveis de ambiente definidas no docker-compose.yml

spring.application.name=backend
server.port=8080

# Configuracao do Banco de Dados PostgreSQL (1-to-1 com Connection.php)
# O PHP resolvia IPv4 manualmente se desse erro. No Java, o driver JDBC normalmente gerencia isso bem,
# porem mantivemos a mesma estrutura de conexao.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Timeout configurado como no PDO::ATTR_TIMEOUT => 5
spring.datasource.hikari.connection-timeout=5000

# Configuracao JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracao do Redis (equivalente a leitura do REDIS_URL)
spring.data.redis.url=${REDIS_URL}
